<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="icon" href="images/dkmath-logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DK Math - Administrator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section>
<button onclick="logoutAdmin()" class="btn">
Wyloguj administratora
</button>
<h1>Panel Administratora</h1>
<div class="cards">
<div class="card">

<h2>Statystyki</h2>

<div id="stats"></div>

</div>
<div class="card">
<h2 id="usersCount">0</h2>
<p>Uczniów</p>
</div>

<div class="card">
<h2 id="tasksCount">0</h2>
<p>Zadań</p>
</div>

<div class="card">
<h2 id="opinionsCount">0</h2>
<p>Opinii</p>
</div>

<div class="card">
<h2 id="bookingsCount">0</h2>
<p>Rezerwacji</p>
</div>

</div>
<div class="card">

<h2>Lista uczniów</h2>

<div id="users"></div>

</div>

<div class="card">

<h2>Dodaj zadanie</h2>

<input type="text" id="login" placeholder="Login ucznia">

<input type="text" id="zadanie" placeholder="Treść zadania">

<button onclick="addTask()">
Dodaj zadanie
</button>
<div class="card">

<h2>Dodaj lekcję</h2>
<div class="card">

<h2>Dodaj materiał</h2>

<input
type="text"
id="materialLogin"
placeholder="Login ucznia">

<input
type="text"
id="materialName"
placeholder="Nazwa materiału">

<input
type="text"
id="materialLink"
placeholder="Link do PDF">

<button onclick="addMaterial()">
Dodaj materiał
</button>

</div>
<input type="text"
id="lessonLogin"
placeholder="Login ucznia">

<input type="date"
id="lessonDate">

<input type="time"
id="lessonTime">

<input type="text"
id="lessonLink"
placeholder="https://meet.google.com/mmp-ycfc-yve">

<button onclick="addLesson()">
Dodaj lekcję
</button>

</div>
</div>
<div class="card">

<h2>Zmień hasło ucznia</h2>

<input type="text" id="changeLogin"
placeholder="Login ucznia">

<input type="text" id="newPassword"
placeholder="Nowe hasło">

<button onclick="changePassword()">
Zmień hasło
</button>

</div>
<div class="card">

<h2>Zgłoszenia na lekcje</h2>

<div id="bookings"></div>

</div>

<div class="card">

<h2>Opinie uczniów</h2>

<div id="opinions"></div>

</div>

<div id="opinions"></div>

</div>
<div id="bookings"></div>

</div>
</section>

<script src="admin.js"></script>

</body>
<script>

if(
localStorage.getItem("adminLogged")
!== "true"
){
    window.location.href =
    "loginadmin.html";
}




</script>
</html>
