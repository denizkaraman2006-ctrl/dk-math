
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Ucznia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button onclick="logout()" class="btn">
Wyloguj się
</button>

<section>

<h1 id="welcome"></h1>

<div class="card">
<h3>📚 Moje zadania</h3>
<div id="tasks"></div>
</div>

<div class="card">
<h3>📅 Najbliższa lekcja</h3>
<div id="lesson"></div>
</div>

<div class="card">
<h3>📄 Materiały do pobrania</h3>
<div id="materials"></div>
</div>

<div class="card">
<h3>⭐ Dodaj opinię</h3>

<select id="ocena">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<textarea
id="opinia"
placeholder="Napisz swoją opinię">
</textarea>

<br><br>

<button onclick="addOpinion()">
Wyślij opinię
</button>

</div>

</section>

<script src="dashboard.js"></script>

</body>
</html>
